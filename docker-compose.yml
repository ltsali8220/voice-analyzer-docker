services:
  frontend:
    build:
      context: ./client
      args:
        VITE_BASE_URL: /api
    container_name: athina_frontend
    restart: always
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: athina_backend
    restart: always
    environment:
      - POSTGRES_DB=athina
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DEBUG=False
      - SECRET_KEY=change-me-in-production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: athina_db
    restart: always
    environment:
      - POSTGRES_DB=athina
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - athina_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: athina_proxy
    ports:
      - "8443:443"
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

volumes:
  athina_data:
